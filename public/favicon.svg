<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Glow -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" filter="url(#glow)"/>
  
  <!-- Dark Background -->
  <circle cx="50" cy="50" r="42" fill="#1e1b4b"/>
  
  <!-- Crown -->
  <path d="M28 38 L34 24 L43 33 L50 18 L57 33 L66 24 L72 38 L70 46 L30 46 Z" fill="url(#gold)" filter="url(#glow)"/>
  
  <!-- Crown Jewels -->
  <circle cx="50" cy="28" r="4" fill="#ef4444"/>
  <circle cx="38" cy="33" r="2.5" fill="#3b82f6"/>
  <circle cx="62" cy="33" r="2.5" fill="#22c55e"/>
  
  <!-- "IP" Text -->
  <text x="50" y="72" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" fill="white" text-anchor="middle">IP</text>
  
  <!-- Sparkle Effects -->
  <circle cx="20" cy="25" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="80" cy="30" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="25" cy="70" r="1" fill="#fff" opacity="0.5"/>
</svg>
